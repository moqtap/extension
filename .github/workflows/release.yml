name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build and zip Chrome
        run: |
          bun run build
          bun run zip

      - name: Build and zip Firefox
        run: |
          bun run build:firefox
          bun run zip:firefox

      - name: Rename zips for release
        run: |
          mv .output/*-chrome.zip .output/moqtap-chrome-${{ github.ref_name }}.zip
          mv .output/*-firefox.zip .output/moqtap-firefox-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/moqtap-chrome-${{ github.ref_name }}.zip
            .output/moqtap-firefox-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Chrome Installation

            1. Download **moqtap-chrome-${{ github.ref_name }}.zip** from the assets below
            2. Unzip the file to a folder on your computer
            3. Open Chrome and navigate to `chrome://extensions`
            4. Enable **Developer mode** (toggle in the top-right corner)
            5. Click **Load unpacked** and select the unzipped folder
            6. Open DevTools (F12) — you'll see a new **moqtap** panel

            > **Note:** Chrome does not support installing extensions from `.zip` files directly.
            > You must unzip first, then load the unpacked folder.

            ## Firefox Installation

            1. Download **moqtap-firefox-${{ github.ref_name }}.zip** from the assets below
            2. Open Firefox and navigate to `about:debugging#/runtime/this-firefox`
            3. Click **Load Temporary Add-on**
            4. Select the downloaded `.zip` file (no need to unzip)
            5. Open DevTools (F12) — you'll see a new **moqtap** panel

            > **Note:** Temporary add-ons are removed when Firefox closes.
            > For permanent installation, the extension must be signed via [Mozilla Add-ons](https://addons.mozilla.org).
